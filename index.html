<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metaphysical Dream Keys</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400&family=Raleway:wght@400;500&display=swap" rel="stylesheet">
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="style.css">
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</head>
<body>
<div class="container">
  <h1><span class="meta">METAPHYSICAL</span> <span class="script">DREAM KEYS</span></h1>
  <p class="subtitle">Enter your dream below for a metaphysical interpretation</p>
  <textarea id="dreamInput" placeholder="Describe your dream in as much detail as you like..."></textarea>
<div class="level-selector">
  <label>Interpretation Depth</label>
  <div class="level-buttons">
    <button type="button" class="level-btn" data-level="concise">Concise</button>
    <button type="button" class="level-btn active" data-level="normal">Normal</button>
    <button type="button" class="level-btn" data-level="comprehensive">Comprehensive</button>
  </div>
</div>
  <button id="interpretBtn">Interpret My Dream</button>
  <div id="loading" class="hidden">Interpreting your dream...</div>
  <div id="result" class="hidden"></div>
  <button id="downloadBtn" class="hidden">Download Interpretation</button>
</div>
<script src="app.js"></script>
</body>
</html>
