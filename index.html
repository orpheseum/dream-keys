<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Interpreter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>Dream Interpreter</h1>
  <p class="subtitle">Enter your dream below for a metaphysical interpretation</p>
  <textarea id="dreamInput" placeholder="Describe your dream in as much detail as you like..."></textarea>
  <button id="interpretBtn">Interpret My Dream</button>
  <div id="loading" class="hidden">Interpreting your dream...</div>
  <div id="result" class="hidden"></div>
</div>
<script src="app.js"></script>
</body>
</html>
