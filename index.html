<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metaphysical Dream Keys</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="style.css">
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</head>
<body>
<div class="container">
  <h1><span class="meta">METAPHYSICAL</span><br>Dream Keys</h1>
  <p class="subtitle">Enter your dream below for a metaphysical interpretation</p>

</html>
